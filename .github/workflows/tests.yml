name: tests

on:
  push:
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install './skills/imagen[test,downscale]'
      - run: python -m unittest discover -s skills/imagen/tests -v
      - run: python -m py_compile skills/imagen/scripts/imagen.py
